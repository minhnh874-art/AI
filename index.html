<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Checklist Turnaround Air India</title>
<style>
:root{--red:#c8102e;--bg:#f5f6f8;--line:#dde2ea;--txt:#111827;--muted:#667085;--green:#067647;--blue:#1d4ed8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--txt)}
header{background:#fff;border-bottom:1px solid var(--line);padding:8px;position:sticky;top:0;z-index:9}h1{font-size:16px;margin:0;color:var(--red);line-height:1.15}.sub{font-size:10px;color:var(--muted);margin-top:2px}
main{padding:8px;max-width:760px;margin:auto}.panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}label{display:block;font-size:10px;font-weight:700;color:#344054;margin-bottom:2px}
input,textarea{width:100%;border:1px solid #cfd6e4;border-radius:8px;padding:7px;font-size:16px;background:#fff}textarea{height:32px;min-height:32px;resize:vertical;font-size:13px}
.time{text-align:center;font-weight:800;letter-spacing:.5px}.etdBox label{color:#c8102e;font-size:12px}.etdBox input{border:2px solid #c8102e;background:#fff7f7}
.actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.btn{border:0;border-radius:8px;padding:8px 9px;font-size:12px;font-weight:800;cursor:pointer}.red{background:var(--red);color:#fff}.dark{background:#344054;color:#fff}.green{background:var(--green);color:#fff}.light{background:#f2f4f7;border:1px solid #cfd6e4;color:#111827}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}.card{background:#fff;border:1px solid var(--line);border-radius:8px;text-align:center;padding:6px 3px}.card .t{font-size:9px;color:var(--muted)}.card .n{font-size:16px;font-weight:900}
.task{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;padding:8px}.task.done{background:#f0fdf4}.task.delay{background:#fff7ed}
.row1{display:grid;grid-template-columns:30px 1fr auto;gap:6px;align-items:start}.stt{font-size:12px;font-weight:900;color:#fff;background:#344054;border-radius:999px;text-align:center;padding:3px 0}.name{font-size:13px;font-weight:900;line-height:1.2}.pic{font-size:10px;color:var(--muted);margin-top:2px}.badge{font-size:10px;font-weight:900;border-radius:999px;padding:3px 6px;background:#eef2ff;color:#1d4ed8;white-space:nowrap}
.row2{display:grid;grid-template-columns:70px 82px 80px 1fr;gap:5px;align-items:end;margin-top:7px}.delayText{text-align:center;font-size:12px;font-weight:900;padding:7px 2px;border-radius:8px;background:#f8fafc;border:1px solid var(--line);min-height:34px}.yes,.late{color:#b42318}.no,.early{color:#067647}
.status{font-size:12px;color:var(--blue);font-weight:700;margin-top:6px}.topActions{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
@media(min-width:850px){main{max-width:1280px}.grid{grid-template-columns:repeat(6,1fr)}#tasks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.task{margin-bottom:0}}
@media(max-width:390px){.row2{grid-template-columns:60px 75px 72px 1fr;gap:4px}input,textarea{font-size:15px;padding:6px}.btn{font-size:11px;padding:7px 7px}}
</style>
</head>
<body>
<header><h1>CHECKLIST TURNAROUND AIR INDIA</h1><div class="sub">Theo Excel: Planned Time = ETD - TIME(...). ETD bắt buộc nhập. Nhập giờ nhanh: 0715 hoặc 07:15</div><div class="topActions"><button class="btn green" onclick="submitToGoogleSheets()">Gửi Google Sheets</button><button class="btn light" onclick="downloadExcel()">Excel</button><button class="btn dark" onclick="copyReport()">Copy</button></div></header>
<main>
<section class="panel"><div class="grid">
<div><label>Flight No.</label><input id="flightNo" value="AI2390/AI2391"></div><div><label>Date</label><input id="flightDate" type="date"></div><div class="etdBox"><label>ETD</label><input class="time" id="etd" type="text" inputmode="numeric" maxlength="5" value="08:20" oninput="timeTyping(this)" onblur="this.value=normalizeTimeValue(this.value);render()"></div><div><label>Aircraft / Reg.</label><input id="aircraft"></div><div><label>Bay</label><input id="bay"></div><div><label>Prepared by</label><input id="preparedBy"></div>
</div><div class="actions"><button class="btn red" onclick="saveNow()">Lưu trên máy</button><button class="btn light" onclick="stampFirstEmpty()">Now mục trống đầu</button><button class="btn light" onclick="clearActualTimes()">Xóa giờ</button><button class="btn light" onclick="resetAll()">Reset</button></div><div id="sheetStatus" class="status"></div></section>
<section id="summary" class="summary"></section><section id="tasks"></section>
</main>
<script>
const GOOGLE_SCRIPT_URL = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
const CHECKLIST = [{"stt": 1, "offsetBeforeETD": 60, "task": "Chocks on", "pic": "Ramp"}, {"stt": 2, "offsetBeforeETD": 58, "task": "Bag/Cargo offload start", "pic": "Baggage/Ramp"}, {"stt": 3, "offsetBeforeETD": 57, "task": "Doors Open", "pic": "Cabin/Ramp"}, {"stt": 4, "offsetBeforeETD": 57, "task": "Passengers Deplaning started", "pic": "Ramp/Gate"}, {"stt": 5, "offsetBeforeETD": 55, "task": "Cabin crew reported at aircraft", "pic": "Cabin crew"}, {"stt": 6, "offsetBeforeETD": 46, "task": "Passengers Deplaning end", "pic": "Ramp/Gate"}, {"stt": 7, "offsetBeforeETD": 45, "task": "Cleaning Start", "pic": "Cleaning"}, {"stt": 8, "offsetBeforeETD": 40, "task": "Bag/Cargo offload end", "pic": "Baggage/Ramp"}, {"stt": 9, "offsetBeforeETD": 35, "task": "Cleaning End", "pic": "Cleaning"}, {"stt": 10, "offsetBeforeETD": 60, "task": "Fuel Bowser reported", "pic": "Fuel"}, {"stt": 11, "offsetBeforeETD": 56, "task": "Catering Start", "pic": "Catering"}, {"stt": 12, "offsetBeforeETD": 50, "task": "Fueling Start", "pic": "Fuel"}, {"stt": 13, "offsetBeforeETD": 45, "task": "Security Check Start", "pic": "Security"}, {"stt": 14, "offsetBeforeETD": 38, "task": "Catering End", "pic": "Catering"}, {"stt": 15, "offsetBeforeETD": 40, "task": "Engineering Clearance End", "pic": "Engineering"}, {"stt": 16, "offsetBeforeETD": 30, "task": "Pilots Onboard", "pic": "Flight crew"}, {"stt": 17, "offsetBeforeETD": 40, "task": "Bag/Cargo loading start", "pic": "Baggage/Ramp"}, {"stt": 18, "offsetBeforeETD": 36, "task": "Catering Handover", "pic": "Catering/Ramp"}, {"stt": 19, "offsetBeforeETD": 36, "task": "Security Check End", "pic": "Security/Ramp"}, {"stt": 20, "offsetBeforeETD": 35, "task": "Boarding clearance", "pic": "Ramp/Gate"}, {"stt": 21, "offsetBeforeETD": 35, "task": "Passengers boarding start", "pic": "Gate/Ramp"}, {"stt": 22, "offsetBeforeETD": 20, "task": "Fuelling End", "pic": "Fuel"}, {"stt": 23, "offsetBeforeETD": 20, "task": "Gate No Show notification to aircraft", "pic": "Gate/Ramp"}, {"stt": 24, "offsetBeforeETD": 19, "task": "GNS bag offload start", "pic": "Baggage/Ramp"}, {"stt": 25, "offsetBeforeETD": 18, "task": "Bag/Cargo loading end", "pic": "Baggage/Ramp"}, {"stt": 26, "offsetBeforeETD": 12, "task": "Passengers boarding end", "pic": "Gate/Ramp"}, {"stt": 27, "offsetBeforeETD": 12, "task": "GNS bag offload end", "pic": "Baggage/Ramp"}, {"stt": 28, "offsetBeforeETD": 12, "task": "Hold closed", "pic": "Ramp/Baggage"}, {"stt": 29, "offsetBeforeETD": 11, "task": "Engineering paperwork completed", "pic": "Engineering"}, {"stt": 30, "offsetBeforeETD": 11, "task": "All paperwork completed", "pic": "Ramp/LC"}, {"stt": 31, "offsetBeforeETD": 11, "task": "Ground staff Offboard", "pic": "Ramp/GSSĐ"}, {"stt": 32, "offsetBeforeETD": 10, "task": "Doors Closed", "pic": "Cabin/Ramp"}, {"stt": 33, "offsetBeforeETD": 7, "task": "Tow/Tractor connected", "pic": "Pushback/HS"}, {"stt": 34, "offsetBeforeETD": 7, "task": "Engineers ready to pushback", "pic": "Engineering/HS"}, {"stt": 35, "offsetBeforeETD": 0, "task": "AOBT", "pic": "Ramp"}];
const KEY='turnaroundChecklistAI_ETD_EXCEL_ONLY_v2';
function el(id){return document.getElementById(id)}
function pad(n){return String(n).padStart(2,'0')}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function onlyDigits(s){return String(s||'').replace(/\D/g,'')}
function normalizeTimeValue(v){if(!v)return '';v=String(v).trim();if(/^\d{1,2}:\d{2}$/.test(v)){let p=v.split(':');let h=+p[0],m=+p[1];if(h>=0&&h<=23&&m>=0&&m<=59)return pad(h)+':'+pad(m)}let d=onlyDigits(v);if(d.length===3)d='0'+d;if(d.length>=4){d=d.slice(0,4);let h=+d.slice(0,2),m=+d.slice(2,4);if(h>=0&&h<=23&&m>=0&&m<=59)return pad(h)+':'+pad(m)}return ''}
function timeTyping(input){let d=onlyDigits(input.value).slice(0,4);input.value=d.length>=3?d.slice(0,2)+':'+d.slice(2):d}
function timeToMin(t){t=normalizeTimeValue(t);if(!t)return null;const a=t.split(':').map(Number);return a[0]*60+a[1]}
function minToTime(m){m=((m%1440)+1440)%1440;return pad(Math.floor(m/60))+':'+pad(m%60)}
function planned(offsetBeforeETD){return minToTime(timeToMin(el('etd').value||'08:20')-offsetBeforeETD)}
function diffMin(a,p){if(!a||!p)return null;let d=timeToMin(a)-timeToMin(p);if(d>720)d-=1440;if(d<-720)d+=1440;return d}
function diffText(a,p){const d=diffMin(a,p);if(d===null)return '';const s=d<0?'-':'';const x=Math.abs(d);return s+pad(Math.floor(x/60))+':'+pad(x%60)}
function delayYN(a,p){const d=diffMin(a,p);if(d===null)return '';return d>0?'Yes':'No'}
function getData(){let d={};try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}d.meta=d.meta||{};d.rows=d.rows||{};return d}
function setData(d){localStorage.setItem(KEY,JSON.stringify(d))}
function loadMeta(){const d=getData();el('flightNo').value=d.meta.flightNo||'AI2390/AI2391';el('flightDate').value=d.meta.flightDate||todayISO();el('etd').value=d.meta.etd||'08:20';el('aircraft').value=d.meta.aircraft||'';el('bay').value=d.meta.bay||'';el('preparedBy').value=d.meta.preparedBy||''}
function saveMeta(){const d=getData();d.meta={flightNo:el('flightNo').value,flightDate:el('flightDate').value,etd:normalizeTimeValue(el('etd').value)||el('etd').value,aircraft:el('aircraft').value,bay:el('bay').value,preparedBy:el('preparedBy').value};setData(d)}
function saveRows(){const d=getData();CHECKLIST.forEach(i=>{d.rows[i.stt]=d.rows[i.stt]||{};let a=el('actual_'+i.stt),r=el('reason_'+i.stt);if(a)d.rows[i.stt].actual=normalizeTimeValue(a.value)||a.value;if(r)d.rows[i.stt].reason=r.value});setData(d);updateSummary()}
function saveNow(){saveMeta();saveRows();el('sheetStatus').textContent='Đã lưu tạm trên thiết bị này.'}
function render(){saveMeta();const d=getData();el('tasks').innerHTML='';CHECKLIST.forEach(i=>{const r=d.rows[i.stt]||{};const p=planned(i.offsetBeforeETD);const a=r.actual||'';const yn=delayYN(a,p);const dm=diffText(a,p);const cls=a?(yn==='Yes'?'delay':'done'):'';el('tasks').insertAdjacentHTML('beforeend',`<div class="task ${cls}"><div class="row1"><div class="stt">${i.stt}</div><div><div class="name">${i.task}</div><div class="pic">PIC: ${i.pic}</div></div><div class="badge">Plan ${p}</div></div><div class="row2"><div><label>Actual</label><input class="time" id="actual_${i.stt}" type="text" inputmode="numeric" maxlength="5" value="${a}" oninput="timeTyping(this)" onblur="this.value=normalizeTimeValue(this.value);saveRows();render()"></div><div><label>Delay</label><div class="delayText ${yn==='Yes'?'yes':'no'}">${yn||'-'}</div></div><div><label>Diff</label><div class="delayText ${yn==='Yes'?'late':'early'}">${dm||'-'}</div></div><div><label>Remark</label><textarea id="reason_${i.stt}" oninput="saveRows()">${r.reason||''}</textarea></div></div><div class="actions"><button class="btn red" onclick="stamp(${i.stt})">Now</button><button class="btn light" onclick="clearOne(${i.stt})">Xóa</button></div></div>`)});updateSummary()}
function stamp(stt){const n=new Date();const v=pad(n.getHours())+':'+pad(n.getMinutes());const a=el('actual_'+stt);if(a)a.value=v;saveRows();render()}
function clearOne(stt){const a=el('actual_'+stt);if(a)a.value='';saveRows();render()}
function stampFirstEmpty(){const d=getData();const x=CHECKLIST.find(i=>!((d.rows[i.stt]||{}).actual));if(x)stamp(x.stt)}
function clearActualTimes(){if(!confirm('Xóa toàn bộ Actual Time?'))return;const d=getData();CHECKLIST.forEach(i=>{d.rows[i.stt]=d.rows[i.stt]||{};d.rows[i.stt].actual=''});setData(d);render()}
function resetAll(){if(!confirm('Reset toàn bộ dữ liệu trên thiết bị này?'))return;localStorage.removeItem(KEY);loadMeta();render()}
function updateSummary(){const d=getData();let done=0,late=0,early=0;CHECKLIST.forEach(i=>{const r=d.rows[i.stt]||{};if(r.actual){done++;delayYN(r.actual,planned(i.offsetBeforeETD))==='Yes'?late++:early++}});el('summary').innerHTML=`<div class="card"><div class="t">Tổng</div><div class="n">${CHECKLIST.length}</div></div><div class="card"><div class="t">Đã nhập</div><div class="n">${done}</div></div><div class="card"><div class="t">Delay</div><div class="n" style="color:#b42318">${late}</div></div><div class="card"><div class="t">OK/Early</div><div class="n" style="color:#067647">${early}</div></div>`}
function exportRows(){saveRows();const d=getData();return CHECKLIST.map(i=>{const r=d.rows[i.stt]||{};const p=planned(i.offsetBeforeETD);return {STT:i.stt,PlannedTime:p,ActualTime:r.actual||'',Task:i.task,PIC:i.pic,DelayYN:delayYN(r.actual,p),DelayMinutes:diffText(r.actual,p),ReasonRemark:r.reason||''}})}
function xmlEsc(v){return String(v==null?'':v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function downloadExcel(){const rows=exportRows();const meta=[['Flight No.',el('flightNo').value],['Date',el('flightDate').value],['ETD',el('etd').value],['Aircraft / Reg.',el('aircraft').value],['Bay',el('bay').value],['Prepared by',el('preparedBy').value]];const headers=['STT','PlannedTime','ActualTime','Task','PIC','DelayYN','DelayMinutes','ReasonRemark'];let x=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="h"><Font ss:Bold="1"/><Interior ss:Color="#D9EAF7" ss:Pattern="Solid"/><Alignment ss:WrapText="1"/></Style><Style ss:ID="wrap"><Alignment ss:WrapText="1" Vertical="Top"/></Style></Styles><Worksheet ss:Name="Checklist"><Table><Column ss:Width="45"/><Column ss:Width="85"/><Column ss:Width="85"/><Column ss:Width="230"/><Column ss:Width="110"/><Column ss:Width="75"/><Column ss:Width="90"/><Column ss:Width="260"/>`;meta.forEach(m=>{x+=`<Row><Cell ss:StyleID="h"><Data ss:Type="String">${xmlEsc(m[0])}</Data></Cell><Cell><Data ss:Type="String">${xmlEsc(m[1])}</Data></Cell></Row>`});x+=`<Row></Row><Row>`;headers.forEach(h=>{x+=`<Cell ss:StyleID="h"><Data ss:Type="String">${xmlEsc(h)}</Data></Cell>`});x+=`</Row>`;rows.forEach(r=>{x+=`<Row>`;headers.forEach(h=>{x+=`<Cell ss:StyleID="wrap"><Data ss:Type="String">${xmlEsc(r[h])}</Data></Cell>`});x+=`</Row>`});x+=`</Table></Worksheet></Workbook>`;downloadBlob(x,'Checklist_'+el('flightNo').value.replaceAll('/','-')+'_'+el('flightDate').value+'.xls','application/vnd.ms-excel;charset=utf-8;')}
function downloadBlob(content,filename,type){const blob=new Blob([content],{type:type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
function copyReport(){const rows=exportRows();let t='CHECKLIST TURNAROUND AIR INDIA\nFlight No.: '+el('flightNo').value+'\nDate: '+el('flightDate').value+'\nETD: '+el('etd').value+'\nAircraft: '+el('aircraft').value+'\nBay: '+el('bay').value+'\nPrepared by: '+el('preparedBy').value+'\n\n';rows.forEach(r=>{t+=r.STT+'. '+r.Task+' | Plan '+r.PlannedTime+' | Actual '+r.ActualTime+' | Delay '+r.DelayYN+' '+r.DelayMinutes+' | '+r.ReasonRemark+'\n'});navigator.clipboard.writeText(t).then(()=>alert('Đã copy báo cáo.'))}
function buildPayload(){const rows=exportRows();return {recordKey:(el('flightDate').value+'_'+el('flightNo').value).replaceAll('/','-').replaceAll(' ','_'),savedAtLocal:new Date().toISOString(),flightNo:el('flightNo').value,flightDate:el('flightDate').value,etd:normalizeTimeValue(el('etd').value),aircraft:el('aircraft').value,bay:el('bay').value,preparedBy:el('preparedBy').value,totalTasks:CHECKLIST.length,completedTasks:rows.filter(r=>r.ActualTime).length,delayYes:rows.filter(r=>r.DelayYN==='Yes').length,rows:rows}}
function submitToGoogleSheets(){if(!GOOGLE_SCRIPT_URL||GOOGLE_SCRIPT_URL.indexOf('PASTE_YOUR')>=0){alert('Chưa dán Web App URL của Google Apps Script vào index.html.');return}const payload=buildPayload();if(!payload.flightNo||!payload.flightDate){alert('Cần nhập Flight No. và Date.');return}el('sheetStatus').textContent='Đang gửi dữ liệu lên Google Sheets...';let iframe=el('gs_iframe');if(!iframe){iframe=document.createElement('iframe');iframe.name='gs_iframe';iframe.id='gs_iframe';iframe.style.display='none';document.body.appendChild(iframe)}const form=document.createElement('form');form.method='POST';form.action=GOOGLE_SCRIPT_URL;form.target='gs_iframe';form.style.display='none';const input=document.createElement('input');input.type='hidden';input.name='payload';input.value=JSON.stringify(payload);form.appendChild(input);document.body.appendChild(form);form.submit();setTimeout(()=>{document.body.removeChild(form);el('sheetStatus').textContent='Đã gửi yêu cầu. Mở Google Sheets kiểm tra tab SUMMARY và ngày bay.';alert('Đã gửi yêu cầu lên Google Sheets.')} ,900)}
['flightNo','flightDate','etd','aircraft','bay','preparedBy'].forEach(id=>el(id).addEventListener('input',render));
loadMeta();render();
</script>
</body></html>
